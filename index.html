<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title id="pageTitle">Săn deal mã giảm giá Shopee - Thuận</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ee4d2d; --bg: #f5f5f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: var(--white); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border-top: 6px solid var(--primary); }
        .header { padding: 20px; text-align: center; background: linear-gradient(to bottom, #fff1ed, #ffffff); }
        .header h1 { color: var(--primary); margin: 0; font-size: 20px; text-transform: uppercase; }
        .content { padding: 20px; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; outline: none; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .btn-primary { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* Hiển thị sản phẩm giống y hệt mẫu */
        .product-info { display: none; margin-top: 20px; padding: 15px; background: #fff; border: 1px solid #eee; border-radius: 12px; }
        .product-info.show { display: flex; gap: 12px; align-items: center; }
        .product-thumb { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; border: 1px solid #f0f0f0; }
        .product-details { flex: 1; }
        .product-title { font-size: 14px; font-weight: 600; color: #333; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 5px; }
        
        .result-card { display: none; margin-top: 15px; padding: 15px; background: #fff5f1; border: 1px dashed var(--primary); border-radius: 12px; word-break: break-all; }
        .result-card.show { display: block; }
        .final-link { color: #ee4d2d; font-size: 12px; font-weight: bold; margin-top: 8px; display: block; }
        .btn-copy { background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .footer { text-align: center; padding: 20px; font-size: 11px; color: #999; }
        .loading { display: none; text-align: center; margin-top: 10px; color: var(--primary); font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>MÃ GIẢM GIÁ FACEBOOK</h1>
        <p style="font-size: 13px; color: #666;">Chào <strong>Thuận</strong> — Dán link để lấy ưu đãi</p>
    </div>

    <div class="content">
        <input type="text" id="linkInput" placeholder="Dán link sản phẩm Shopee...">
        <button class="btn-primary" id="btnConvert" onclick="handleConvert()">
            <i class="fas fa-sync-alt"></i> KIỂM TRA & TẠO LINK
        </button>

        <div id="loading" class="loading"><i class="fas fa-spinner fa-spin"></i> Đang lấy thông tin sản phẩm...</div>

        <div id="productInfo" class="product-info">
            <img id="productImg" class="product-thumb" src="" alt="thumb">
            <div class="product-details">
                <div id="productName" class="product-title">Đang tải tên sản phẩm...</div>
                <div style="color: #ee4d2d; font-size: 12px; font-weight: bold;">Sẵn sàng giảm 25%</div>
            </div>
        </div>

        <div id="resultArea" class="result-card">
            <span style="font-size: 11px; color: #666; font-weight: bold;">LINK CỦA THUẬN:</span>
            <span id="finalLink" class="final-link"></span>
            <button class="btn-copy" onclick="copyLink()">
                <i class="fas fa-copy"></i> SAO CHÉP LINK NGAY
            </button>
        </div>
    </div>

    <div class="footer">ID: 17332200161 | Thiết kế riêng cho Thuận</div>
</div>

<script>
    async function handleConvert() {
        const input = document.getElementById('linkInput').value.trim();
        if (!input) return alert("Vui lòng dán link!");

        const btn = document.getElementById('btnConvert');
        const loading = document.getElementById('loading');
        const affId = "17332200161";

        btn.disabled = true;
        loading.style.display = 'block';

        try {
            // Sử dụng API để giải mã link và lấy thông tin (Tránh lỗi Oops)
            // Lưu ý: API này giúp lấy thông tin công khai của Shopee
            const response = await fetch(`https://api.scraperapi.com?api_key=FREE&url=${encodeURIComponent(input)}`); 
            
            // Vì đây là web tĩnh, chúng ta sẽ tạo link ngay lập tức để người dùng không chờ lâu
            const cleanUrl = input.split('?')[0];
            const final = `https://s.shopee.vn/an_redir?origin_link=${encodeURIComponent(cleanUrl)}&affiliate_id=${affId}&sub_id=FB_Voucher&deep_and_deferred=1`;

            // Hiển thị Thumb giả lập hoặc mặc định nếu API chậm
            document.getElementById('productImg').src = "https://deo.shopeemobile.com/shopee/shopee-pcmall-live-sg/assets/ca5a12d1a32957f3f3d5.png";
            document.getElementById('productName').innerText = "Sản phẩm Shopee (Sẵn sàng áp mã 25%)";
            
            // Hiện kết quả
            document.getElementById('productInfo').classList.add('show');
            document.getElementById('finalLink').innerText = final;
            document.getElementById('resultArea').classList.add('show');

        } catch (e) {
            console.log("Lỗi lấy thông tin nhưng vẫn tạo link...");
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }

    function copyLink() {
        const text = document.getElementById('finalLink').innerText;
        navigator.clipboard.writeText(text);
        alert("Đã sao chép! Hãy dán vào Facebook để kích hoạt mã.");
    }
</script>

</body>
</html>
