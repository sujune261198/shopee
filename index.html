<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title id="pageTitle">Săn deal mã giảm giá Shopee - Thuận</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ee4d2d; --primary-dark: #d73211; --primary-light: #fff1ed; --bg: #f5f5f5; --bg-card: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; background: var(--bg-card); border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; border-top: 6px solid var(--primary); }
        .header { padding: 25px 20px; text-align: center; background: linear-gradient(to bottom, var(--primary-light), #ffffff); }
        .header h1 { color: var(--primary); margin: 0; font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .header-sub { color: #666; font-size: 14px; margin-top: 8px; }
        .content { padding: 20px; }
        .input-group { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 16px 15px; border: 2px solid #eee; border-radius: 16px; box-sizing: border-box; outline: none; font-size: 15px; transition: all 0.3s ease; background: #fafafa; }
        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(238, 77, 45, 0.1); }
        .btn-primary { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-primary:active { transform: scale(0.96); }
        
        /* Product Info chuẩn Vi Vi */
        .result-card { display: none; margin-top: 25px; padding: 15px; border: 1.5px solid #eee; border-radius: 20px; background: #fff; animation: fadeIn 0.4s ease forwards; }
        .result-card.show { display: block; }
        .product-info { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; }
        .product-img { width: 90px; height: 90px; border-radius: 12px; object-fit: cover; border: 1px solid #f0f0f0; }
        .product-name { font-size: 14px; font-weight: 600; color: #333; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .final-box { background: var(--primary-light); border: 1px dashed var(--primary); border-radius: 12px; padding: 12px; margin-top: 10px; }
        .final-link { color: var(--primary); font-size: 12px; font-weight: 700; word-break: break-all; display: block; text-align: center; }
        
        .btn-copy { background: #2ecc71; color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px; }
        
        .footer { text-align: center; padding: 20px; font-size: 11px; color: #aaa; }
        .loading { display: none; text-align: center; margin: 15px 0; color: var(--primary); font-weight: bold; font-size: 14px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>MÃ GIẢM GIÁ 25% SHOPEE</h1>
        <div class="header-sub">Chào mừng <strong>Thuận</strong> — Công cụ lấy link sạch</div>
    </div>

    <div class="content">
        <div class="input-group">
            <input type="text" id="linkInput" placeholder="Dán link sản phẩm Shopee tại đây...">
        </div>
        
        <button class="btn-primary" id="btnConvert" onclick="handleConvert()">
            <i class="fas fa-bolt"></i> KIỂM TRA & TẠO LINK
        </button>

        <div id="loading" class="loading">
            <i class="fas fa-circle-notch fa-spin"></i> Đang đọc dữ liệu sản phẩm...
        </div>

        <div id="resultArea" class="result-card">
            <div class="product-info">
                <img id="productImg" class="product-img" src="" alt="Thumbnail">
                <div class="product-detail">
                    <div id="productName" class="product-name">Đang tải tên sản phẩm...</div>
                    <div style="color: #2ecc71; font-size: 12px; font-weight: bold; margin-top: 4px;">
                        <i class="fas fa-check-circle"></i> Sẵn sàng áp mã 25%
                    </div>
                </div>
            </div>
            
            <div class="final-box">
                <span id="finalLink" class="final-link"></span>
            </div>

            <button class="btn-copy" onclick="copyToClipboard()">
                <i class="fas fa-copy"></i> SAO CHÉP LINK GỬI FACEBOOK
            </button>
        </div>
    </div>

    <div class="footer">
        Hệ thống tự động của Thuận | ID: 17332200161
    </div>
</div>

<script>
    const MY_AFF_ID = "17332200161";

    async function handleConvert() {
        const input = document.getElementById('linkInput').value.trim();
        if (!input) return alert("Dán link Shopee vào đã Thuận ơi!");

        const loading = document.getElementById('loading');
        const resultArea = document.getElementById('resultArea');
        const btn = document.getElementById('btnConvert');

        loading.style.display = 'block';
        resultArea.classList.remove('show');
        btn.disabled = true;

        try {
            // Bước 1: Dùng API để giải mã link và lấy Thumbnail/Name (Sử dụng API chung hệ thống mẫu)
            const response = await fetch(`https://api.v99.io/api/shopee/origin-link?url=${encodeURIComponent(input)}`);
            const json = await response.json();

            if (json && json.data) {
                const data = json.data;
                // Hiển thị ảnh và tên chuẩn
                document.getElementById('productImg').src = data.image || "";
                document.getElementById('productName').innerText = data.name || "Sản phẩm Shopee";

                // Bước 2: Tạo link Affiliate của bạn (Xử lý chống lỗi Oops)
                const originUrl = data.origin_url.split('?')[0]; // Lấy link sạch
                const final = `https://s.shopee.vn/an_redir?origin_link=${encodeURIComponent(originUrl)}&affiliate_id=${MY_AFF_ID}&sub_id=Thuận_FB&deep_and_deferred=1`;

                document.getElementById('finalLink').innerText = final;
                resultArea.classList.add('show');
            } else {
                throw new Error();
            }
        } catch (e) {
            // Trường hợp lỗi API vẫn tạo link dự phòng để Thuận dùng
            const backupUrl = input.split('?')[0];
            const finalBackup = `https://s.shopee.vn/an_redir?origin_link=${encodeURIComponent(backupUrl)}&affiliate_id=${MY_AFF_ID}&sub_id=Thuận_Backup&deep_and_deferred=1`;
            
            document.getElementById('productName').innerText = "Sản phẩm từ Link rút gọn";
            document.getElementById('productImg').src = "https://deo.shopeemobile.com/shopee/shopee-pcmall-live-sg/assets/ca5a12d1a32957f3f3d5.png";
            document.getElementById('finalLink').innerText = finalBackup;
            resultArea.classList.add('show');
        } finally {
            loading.style.display = 'none';
            btn.disabled = false;
        }
    }

    function copyToClipboard() {
        const text = document.getElementById('finalLink').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Đã sao chép link của Thuận! Dán ngay vào Facebook nhé.");
        });
    }
</script>

</body>
</html>
