<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Săn deal Shopee - Thuận</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ee4d2d; --bg: #f5f5f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: #fff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border-top: 6px solid var(--primary); }
        .header { padding: 20px; text-align: center; background: linear-gradient(to bottom, #fff1ed, #ffffff); }
        .header h1 { color: var(--primary); margin: 0; font-size: 20px; }
        .content { padding: 20px; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; outline: none; margin-bottom: 15px; }
        .btn-primary { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #productInfo { display: none; margin-top: 20px; padding: 15px; border: 1px solid #eee; border-radius: 12px; gap: 12px; align-items: center; background: #fff; }
        .thumb { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; }
        .title { font-size: 14px; font-weight: bold; color: #333; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .result-card { display: none; margin-top: 15px; padding: 15px; background: #fff5f1; border: 1px dashed var(--primary); border-radius: 12px; word-break: break-all; }
        .btn-copy { background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .loading { display: none; text-align: center; color: var(--primary); margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>VOUCHER 25% FACEBOOK</h1>
        <p>Chào <strong>Thuận</strong> — Chuyển link chuẩn 100%</p>
    </div>

    <div class="content">
        <input type="text" id="linkInput" placeholder="Dán link Shopee (kể cả link rút gọn)...">
        <button class="btn-primary" onclick="handleConvert()">
            <i class="fas fa-magic"></i> TẠO LINK GIẢM GIÁ
        </button>

        <div id="loading" class="loading"><i class="fas fa-spinner fa-spin"></i> Đang giải mã link & lấy ảnh...</div>

        <div id="productInfo">
            <img id="pImg" class="thumb" src="">
            <div class="pDetail">
                <div id="pName" class="title"></div>
                <div style="color: #ee4d2d; font-size: 12px; font-weight: bold;">Sẵn sàng áp mã giảm giá</div>
            </div>
        </div>

        <div id="resultArea" class="result-card">
            <span style="font-size: 11px; color: #666;">LINK CỦA THUẬN (DÁN VÀO FB):</span>
            <div id="finalLink" style="color: #ee4d2d; font-weight: bold; font-size: 13px; margin-top: 5px;"></div>
            <button class="btn-copy" onclick="copyLink()">SAO CHÉP LINK</button>
        </div>
    </div>
    <div class="footer" style="text-align: center; padding-bottom: 20px; font-size: 10px; color: #ccc;">ID Affiliate: 17332200161</div>
</div>

<script>
    async function handleConvert() {
        const input = document.getElementById('linkInput').value.trim();
        const myAffId = "17332200161";
        if (!input) return alert("Dán link vào đã Thuận ơi!");

        document.getElementById('loading').style.display = 'block';
        document.getElementById('productInfo').style.display = 'none';
        document.getElementById('resultArea').style.display = 'none';
        
        try {
            // Bước 1: Gọi API để giải mã link rút gọn thành link gốc (origin_link)
            const response = await fetch(`https://api.v99.io/api/shopee/origin-link?url=${encodeURIComponent(input)}`);
            const result = await response.json();

            if (result && result.data) {
                const originUrl = result.data.origin_url; // Link gốc sau khi giải mã
                const pName = result.data.name;
                const pThumb = result.data.image;

                // Bước 2: Tạo link an_redir chuẩn, xóa sạch tham số rác của link gốc
                const cleanOrigin = originUrl.split('?')[0];
                const final = `https://s.shopee.vn/an_redir?origin_link=${encodeURIComponent(cleanOrigin)}&affiliate_id=${myAffId}&sub_id=Thuận_FB&deep_and_deferred=1`;

                // Bước 3: Cập nhật giao diện
                document.getElementById('pImg').src = pThumb;
                document.getElementById('pName').innerText = pName;
                document.getElementById('productInfo').style.display = 'flex';
                document.getElementById('finalLink').innerText = final;
                document.getElementById('resultArea').style.display = 'block';
            } else {
                throw new Error("Không giải mã được");
            }
        } catch (e) {
            // Nếu API giải mã lỗi, dùng phương án dự phòng (cắt link trực tiếp)
            const backupClean = input.split('?')[0];
            const finalBackup = `https://s.shopee.vn/an_redir?origin_link=${encodeURIComponent(backupClean)}&affiliate_id=${myAffId}&sub_id=Thuận_Lỗi&deep_and_deferred=1`;
            document.getElementById('finalLink').innerText = finalBackup;
            document.getElementById('resultArea').style.display = 'block';
            alert("Không lấy được ảnh do link rút gọn, nhưng link giảm giá vẫn dùng được nhé!");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function copyLink() {
        const text = document.getElementById('finalLink').innerText;
        navigator.clipboard.writeText(text);
        alert("Đã sao chép! Dán vào Facebook là xong.");
    }
</script>
</body>
</html>
